<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密室逃脫謎題檢索</title>
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --border: #e8d5bc;
    --text: #2d1a09;
    --text-dim: #8a6645;
    --accent: #b45309;
    --accent-light: #d97706;
    --tag-text: #92400e;
    --tag-bg: rgba(180,83,9,.11);
    --green: #047857;
    --green-bg: rgba(4,120,87,.1);
    --amber: #92400e;
    --amber-bg: rgba(146,64,14,.1);
    --rose: #9f1239;
    --rose-bg: rgba(159,18,57,.1);
    --cyan: #0e7490;
    --cyan-bg: rgba(14,116,144,.1);
    --blue: #1e40af;
    --blue-bg: rgba(30,64,175,.1);
    --orange: #c2410c;
    --orange-bg: rgba(194,65,12,.1);
    --teal: #0f766e;
    --teal-bg: rgba(15,118,110,.1);
    --purple: #7c3aed;
    --purple-bg: rgba(124,58,237,.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #6b2d0a 0%, #b45309 45%, #d97706 75%, #b45309 100%);
    border-bottom: 2px solid #92400e;
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: .06em;
    color: #fef3c7;
    text-shadow: 0 1px 4px rgba(0,0,0,.35);
    margin-bottom: .45rem;
  }
  .header p { color: #fde68a; font-size: .95rem; letter-spacing: .02em; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-top: 1.2rem;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: .4rem;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 99px;
    padding: .3rem .9rem;
    font-size: .82rem;
    color: #fef3c7;
  }
  .stat-chip strong { color: #fff; font-size: 1rem; font-weight: 700; }

  /* ── Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

  /* ── Controls ── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 1rem 0 .8rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .search-box {
    position: relative;
    margin-bottom: .9rem;
  }
  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    width: 18px; height: 18px;
  }
  .search-box input {
    width: 100%;
    padding: .75rem 1rem .75rem 2.8rem;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    box-shadow: 0 1px 4px rgba(180,83,9,.06);
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(180,83,9,.12);
  }

  .filter-row {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: .78rem;
    color: var(--text-dim);
    margin-right: .1rem;
    white-space: nowrap;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .filter-btn {
    padding: .3rem .75rem;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: .78rem;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent-light); color: var(--accent); }
  .filter-btn.active {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .filter-divider {
    width: 1px; height: 20px;
    background: var(--border);
    margin: 0 .2rem;
  }

  /* ── Result info ── */
  .result-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: .84rem;
    color: var(--text-dim);
  }
  .result-info strong { color: var(--accent); }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1.15rem 1.25rem;
    transition: border-color .22s, transform .22s, box-shadow .22s;
    display: flex;
    flex-direction: column;
    gap: .65rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    opacity: 0;
    transition: opacity .22s;
  }
  .card:hover {
    border-color: var(--accent-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(180,83,9,.12);
  }
  .card:hover::before { opacity: 1; }

  .card-no-link { cursor: default; }
  .card-no-link:hover {
    transform: none;
    box-shadow: 0 2px 8px rgba(180,83,9,.06);
    border-color: var(--border);
  }
  .card-no-link:hover::before { opacity: 0; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: .5rem;
  }
  .card-title {
    font-size: 1.08rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
    color: var(--text);
  }
  .open-badge {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    padding: .25rem .6rem;
    border-radius: 7px;
    background: var(--accent);
    color: #fff;
    font-size: .72rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .card:hover .open-badge { opacity: 1; }
  .open-badge svg { width: 11px; height: 11px; }

  .card-desc {
    font-size: .86rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    margin-top: auto;
    padding-top: .1rem;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    padding: .18rem .55rem;
    border-radius: 6px;
    font-size: .7rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag-cat    { background: var(--tag-bg);    color: var(--tag-text); }
  .tag-act-106{ background: var(--green-bg);  color: var(--green); }
  .tag-act-108{ background: var(--amber-bg);  color: var(--amber); }
  .tag-act-112{ background: var(--cyan-bg);   color: var(--cyan); }
  .tag-act-113{ background: var(--teal-bg);   color: var(--teal); }
  .tag-act-alc{ background: var(--rose-bg);   color: var(--rose); }
  .tag-act-joy{ background: var(--purple-bg); color: var(--purple); }
  .tag-room   { background: var(--blue-bg);   color: var(--blue); }
  .tag-answer { background: var(--orange-bg); color: var(--orange); }

  .no-result {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-dim);
  }
  .no-result .big { font-size: 3rem; margin-bottom: .5rem; }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.5rem; }
    .cards { grid-template-columns: 1fr; }
    .stats-bar { gap: .7rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔐 密室逃脫謎題檢索</h1>
  <p>橫跨六場活動的完整謎題庫，快速查找、分類瀏覽</p>
  <div class="stats-bar">
    <div class="stat-chip"><strong id="totalCount">0</strong>&nbsp;道謎題</div>
    <div class="stat-chip"><strong>7</strong>&nbsp;場活動</div>
    <div class="stat-chip"><strong>7</strong>&nbsp;種類型</div>
  </div>
</div>

<div class="container">
  <div class="controls">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="搜尋謎題名稱、說明、答案、場景…">
    </div>
    <div class="filter-row">
      <span class="filter-label">類型</span>
      <button class="filter-btn active" data-filter="cat" data-value="all">全部</button>
      <button class="filter-btn" data-filter="cat" data-value="文字語文">🔤 文字語文</button>
      <button class="filter-btn" data-filter="cat" data-value="密碼解碼">🔢 密碼解碼</button>
      <button class="filter-btn" data-filter="cat" data-value="邏輯推理">🧩 邏輯推理</button>
      <button class="filter-btn" data-filter="cat" data-value="數學計算">➕ 數學計算</button>
      <button class="filter-btn" data-filter="cat" data-value="視覺空間">👁️ 視覺空間</button>
      <button class="filter-btn" data-filter="cat" data-value="聽覺感知">🎧 聽覺感知</button>
      <button class="filter-btn" data-filter="cat" data-value="實體機關">⚙️ 實體機關</button>
      <div class="filter-divider"></div>
      <span class="filter-label">活動</span>
      <button class="filter-btn active" data-filter="act" data-value="all">全部</button>
      <button class="filter-btn" data-filter="act" data-value="106">106年</button>
      <button class="filter-btn" data-filter="act" data-value="108">108年</button>
      <button class="filter-btn" data-filter="act" data-value="112">112年</button>
      <button class="filter-btn" data-filter="act" data-value="113">113年 精靈王國</button>
      <button class="filter-btn" data-filter="act" data-value="嘉年華">嘉年華（110年）</button>
      <button class="filter-btn" data-filter="act" data-value="煉金城市">煉金城市</button>
    </div>
  </div>

  <div class="result-info">
    <span>顯示 <strong id="visibleCount">0</strong> / <strong id="totalCount2">0</strong> 題</span>
    <span id="filterDesc" style="font-size:.8rem;">點選卡片可開啟謎題檔案</span>
  </div>

  <div class="cards" id="cardsContainer"></div>
</div>

<script>
const puzzles = [
  // ── 106 / 107年 ──────────────────────────────────────────
  { name:"填字謎題", cat:"文字語文", act:"106", room:"", desc:"英文字母方格中找出隱藏單字（Word Search），通關地點藏有大量謎底。", answer:"", link:"./pdf/106_填字謎題.pdf" },
  { name:"藏頭詩", cat:"文字語文", act:"106", room:"", desc:"從詩句或文章中取每行首字，組合成答案線索。", answer:"", link:"./pdf/106_藏頭.pdf" },
  { name:"中文字方格密碼", cat:"文字語文", act:"106", room:"", desc:"9×7 中文字方格，在看似無意義的字陣中找出隱藏的關鍵詞彙。", answer:"", link:"./pdf/106_謎題-全.pdf#page=7" },
  { name:"迷宮", cat:"視覺空間", act:"106", room:"", desc:"找出迷宮的正確通路，沿途或終點取得對應線索。", answer:"", link:"./pdf/106_謎題-全.pdf#page=3" },

  { name:"奇怪的馬路", cat:"視覺空間", act:"106", room:"", desc:"觀察不尋常的街道圖，從中找出隱藏的線索。", answer:"", link:"./pdf/106_謎題-全.pdf#page=5" },
  { name:"鞋底暗號", cat:"密碼解碼", act:"106", room:"", desc:"鞋底花紋圖案中隱藏暗號，需轉換角度觀察。", answer:"", link:"./pdf/106_謎題-全.pdf#page=4" },
  { name:"謎題-全（數字矩陣）", cat:"密碼解碼", act:"106", room:"", desc:"大量數字構成的矩陣，找出排列規律以解碼。", answer:"", link:"./pdf/106_謎題-全.pdf#page=1" },

  // ── 108年 ─────────────────────────────────────────────────
  { name:"藏書密碼", cat:"文字語文", act:"108", room:"", desc:"利用書中文字或成語推算密碼，兩句成語隱含線索。", answer:"", link:"./pdf/108_謎題.pdf#page=1" },

  { name:"奇妙的數學式", cat:"數學計算", act:"108", room:"", desc:"英文單字當數字（FORTY + TEN + TEN = SIXTY），推算 FIFTY = ?????。", answer:"", link:"./pdf/108_謎題.pdf#page=2" },

// ── State ─────────────────────────────────────────────────
let filterCat = "all", filterAct = "all", searchTerm = "";

document.getElementById("totalCount").textContent  = puzzles.length;
document.getElementById("totalCount2").textContent = puzzles.length;

// ── Render ────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById("cardsContainer");
  const filtered = puzzles.filter(p => {
    if (filterCat !== "all" && p.cat !== filterCat) return false;
    if (filterAct !== "all" && p.act !== filterAct) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      if (!(p.name + p.desc + p.answer + p.cat + p.room + p.act).toLowerCase().includes(s)) return false;
    }
    return true;
  });

  document.getElementById("visibleCount").textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-result"><div class="big">🔍</div><p>找不到符合條件的謎題，試試其他關鍵字？</p></div>';
    return;
  }

  const linkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
  </svg>`;

  container.innerHTML = filtered.map(p => {
    const cm   = catMeta[p.cat] || { icon:"❓" };
    const am   = actMeta[p.act] || { label:p.act, css:"tag-act-106" };
    const hasLink = !!p.link;

    const cardAttr = hasLink
      ? `class="card" role="button" tabindex="0" data-href="${p.link}"
         onclick="window.open(this.dataset.href,'_blank')"
         onkeydown="if(event.key==='Enter')window.open(this.dataset.href,'_blank')"`
      : `class="card card-no-link"`;

    const badge = hasLink
      ? `<span class="open-badge">${linkIcon}開啟</span>`
      : `<span class="open-badge" style="visibility:hidden">.</span>`;

    const roomTag   = p.room   ? `<span class="tag tag-room">${p.room}</span>`           : "";
    const answerTag = p.answer ? `<span class="tag tag-answer">答案：${p.answer}</span>` : "";

    return `
      <div ${cardAttr}>
        <div class="card-top">
          <div class="card-title">${p.name}</div>
          ${badge}
        </div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-tags">
          <span class="tag tag-cat">${cm.icon} ${p.cat}</span>
          <span class="tag ${am.css}">${am.label}</span>
          ${roomTag}${answerTag}
        </div>
      </div>`;
  }).join("");
}

// ── Filters ───────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const { filter: type, value: val } = btn.dataset;
    document.querySelectorAll(`.filter-btn[data-filter="${type}"]`).forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (type === "cat") filterCat = val;
    if (type === "act") filterAct = val;
    renderCards();
  });
});

// ── Search ────────────────────────────────────────────────
let debounce;
document.getElementById("searchInput").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { searchTerm = e.target.value.trim(); renderCards(); }, 180);
});

renderCards();
</script>
