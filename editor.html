<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>謎題卡片編輯器</title>
  <style>
    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8d5bc;
      --text: #2d1a09;
      --text-dim: #8a6645;
      --accent: #b45309;
      --accent-light: #d97706;
      --tag-text: #92400e;
      --tag-bg: rgba(180, 83, 9, .11);
      --green: #047857;
      --green-bg: rgba(4, 120, 87, .1);
      --amber: #92400e;
      --amber-bg: rgba(146, 64, 14, .1);
      --rose: #9f1239;
      --rose-bg: rgba(159, 18, 57, .1);
      --cyan: #0e7490;
      --cyan-bg: rgba(14, 116, 144, .1);
      --blue: #1e40af;
      --blue-bg: rgba(30, 64, 175, .1);
      --orange: #c2410c;
      --orange-bg: rgba(194, 65, 12, .1);
      --teal: #0f766e;
      --teal-bg: rgba(15, 118, 110, .1);
      --purple: #7c3aed;
      --purple-bg: rgba(124, 58, 237, .1);
      --danger: #dc2626;
      --danger-bg: rgba(220, 38, 38, .08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #6b2d0a 0%, #b45309 45%, #d97706 75%, #b45309 100%);
      border-bottom: 2px solid #92400e;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: .06em;
      color: #fef3c7;
      text-shadow: 0 1px 4px rgba(0,0,0,.35);
      margin-bottom: .3rem;
    }
    .header p { color: #fde68a; font-size: .9rem; }
    .header-actions {
      display: flex; justify-content: center; gap: .6rem; margin-top: 1rem; flex-wrap: wrap;
    }
    .header-btn {
      padding: .45rem 1.1rem;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.13);
      color: #fef3c7;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .header-btn:hover { background: rgba(255,255,255,.25); }
    .header-btn.primary { background: #fff; color: var(--accent); border-color: #fff; }
    .header-btn.primary:hover { background: #fef3c7; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: .8rem;
      margin-bottom: 1.2rem;
      padding: .8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .toolbar-left { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
    .toolbar-right { display: flex; align-items: center; gap: .6rem; }
    .search-mini {
      padding: .5rem .8rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: .88rem;
      color: var(--text);
      outline: none;
      width: 220px;
      transition: border-color .2s;
    }
    .search-mini:focus { border-color: var(--accent); }
    .toolbar-info { font-size: .82rem; color: var(--text-dim); }
    .toolbar-info strong { color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .42rem .9rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent-light); color: var(--accent); }
    .btn-accent {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .btn-accent:hover { background: var(--accent-light); border-color: var(--accent-light); color: #fff; }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
    .btn-sm { padding: .3rem .6rem; font-size: .74rem; }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    thead { background: var(--tag-bg); }
    th {
      padding: .65rem .7rem;
      text-align: left;
      font-size: .76rem;
      font-weight: 700;
      color: var(--tag-text);
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
      border-bottom: 1.5px solid var(--border);
      user-select: none;
      cursor: pointer;
    }
    th:hover { color: var(--accent); }
    td {
      padding: .5rem .7rem;
      border-bottom: 1px solid #f0e6d8;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(180, 83, 9, .03); }
    tr.editing td { background: #fffbeb; }

    /* ── Cell styles ── */
    .cell-name { font-weight: 600; color: var(--text); min-width: 120px; }
    .cell-cat, .cell-act, .cell-room { min-width: 80px; }
    .cell-desc { min-width: 200px; max-width: 320px; color: var(--text-dim); line-height: 1.5; }
    .cell-answer { min-width: 80px; }
    .cell-link { min-width: 60px; }
    .cell-actions { white-space: nowrap; min-width: 90px; }

    .answer-hidden {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .15rem .5rem;
      border-radius: 5px;
      background: var(--orange-bg);
      color: var(--orange);
      font-size: .76rem;
      cursor: pointer;
      user-select: none;
      transition: all .18s;
    }
    .answer-hidden:hover { background: rgba(194, 65, 12, .2); }
    .answer-text {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 5px;
      background: var(--orange-bg);
      color: var(--orange);
      font-size: .78rem;
      font-weight: 600;
    }
    .answer-empty { color: #ccc; font-style: italic; font-size: .78rem; }
    .link-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--green-bg);
      color: var(--green);
      text-decoration: none;
      font-size: .72rem;
      transition: all .18s;
    }
    .link-icon:hover { background: rgba(4,120,87,.2); }
    .no-link { color: #ddd; }

    .tag-mini {
      display: inline-block;
      padding: .12rem .45rem;
      border-radius: 5px;
      font-size: .72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Edit Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem;
      overflow-y: auto;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      width: 100%;
      max-width: 640px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; color: var(--text-dim);
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: var(--danger-bg); color: var(--danger); }
    .modal-body { padding: 1.5rem; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: .6rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-dim);
      margin-bottom: .35rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: .55rem .8rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: .88rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .8rem; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: .7rem 1.2rem;
      border-radius: 10px;
      background: #065f46;
      color: #ecfdf5;
      font-size: .85rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      z-index: 2000;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .header h1 { font-size: 1.35rem; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-mini { width: 100%; }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>📝 謎題卡片編輯器</h1>
    <p>新增、編輯、管理密室逃脫謎題資料</p>
    <div class="header-actions">
      <a href="index.html" class="header-btn">← 返回檢索頁</a>
      <button class="header-btn" onclick="exportJSON()">📋 匯出 JSON</button>
      <button class="header-btn" onclick="importJSON()">📥 匯入 JSON</button>
      <button class="header-btn primary" onclick="openModal()">+ 新增謎題</button>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <div class="toolbar-left">
        <input type="text" class="search-mini" id="editorSearch" placeholder="搜尋謎題名稱或說明…">
        <select class="search-mini" id="filterCat" style="width:130px;">
          <option value="all">全部類型</option>
          <option value="文字語文">🔤 文字語文</option>
          <option value="密碼解碼">🔢 密碼解碼</option>
          <option value="邏輯推理">🧩 邏輯推理</option>
          <option value="數學計算">➕ 數學計算</option>
          <option value="視覺空間">👁️ 視覺空間</option>
          <option value="聽覺感知">🎧 聽覺感知</option>
          <option value="實體機關">⚙️ 實體機關</option>
        </select>
        <select class="search-mini" id="filterAct" style="width:140px;">
          <option value="all">全部活動</option>
        </select>
      </div>
      <div class="toolbar-right">
        <span class="toolbar-info">顯示 <strong id="visibleCount">0</strong> / <strong id="totalCount">0</strong> 題</span>
        <button class="btn btn-sm" id="toggleAnswerBtn" onclick="toggleGlobalAnswer()">👁️ 顯示答案</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">#　名稱</th>
            <th onclick="sortBy('cat')">類型</th>
            <th onclick="sortBy('act')">活動</th>
            <th>房間</th>
            <th>說明</th>
            <th>答案</th>
            <th>連結</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Edit / Add Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新增謎題</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>謎題名稱 *</label>
          <input type="text" id="f_name" placeholder="例：藏頭詩">
        </div>
        <div class="form-row-3">
          <div class="form-group">
            <label>類型 *</label>
            <select id="f_cat">
              <option value="文字語文">🔤 文字語文</option>
              <option value="密碼解碼">🔢 密碼解碼</option>
              <option value="邏輯推理">🧩 邏輯推理</option>
              <option value="數學計算">➕ 數學計算</option>
              <option value="視覺空間">👁️ 視覺空間</option>
              <option value="聽覺感知">🎧 聽覺感知</option>
              <option value="實體機關">⚙️ 實體機關</option>
            </select>
          </div>
          <div class="form-group">
            <label>活動 *</label>
            <select id="f_act">
              <option value="106">106年 親子密逃</option>
              <option value="107">107年 親子密逃</option>
              <option value="108">108年 密逃</option>
              <option value="109">109年 畢業密室</option>
              <option value="112">112年 密逃</option>
              <option value="113">113年 精靈王國</option>
              <option value="嘉年華">110年 嘉年華</option>
              <option value="煉金城市">煉金城市</option>
            </select>
          </div>
          <div class="form-group">
            <label>房間 / 子場景</label>
            <input type="text" id="f_room" placeholder="例：學校房-鼎硯">
          </div>
        </div>
        <div class="form-group">
          <label>說明</label>
          <textarea id="f_desc" placeholder="謎題的簡要描述…"></textarea>
        </div>
        <div class="form-group">
          <label>答案</label>
          <input type="text" id="f_answer" placeholder="留空表示無標準答案">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>檔案連結 (link)</label>
            <input type="text" id="f_link" placeholder="./pdf/xxx.pdf 或 https://...">
          </div>
          <div class="form-group">
            <label>互動驗證連結 (playLink)</label>
            <input type="text" id="f_playLink" placeholder="validators/xxx.html">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-accent" id="modalSaveBtn" onclick="savePuzzle()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">

  <div class="toast" id="toast"></div>

  <script>
    // ── Puzzle data (same as index.html) ──
    const defaultPuzzles = [
      { name: "填字謎題", cat: "文字語文", act: "106", room: "", desc: "英文字母方格中找出隱藏單字（Word Search），通關地點藏有大量謎底。", answer: "", link: "./pdf/106_填字謎題.pdf" },
      { name: "藏頭詩", cat: "文字語文", act: "106", room: "", desc: "從詩句或文章中取每行首字，組合成答案線索。", answer: "", link: "./pdf/106_藏頭.pdf" },
      { name: "中文字方格密碼", cat: "文字語文", act: "107", room: "", desc: "9×7 中文字方格，在看似無意義的字陣中找出隱藏的關鍵詞彙。", answer: "", link: "./pdf/106_謎題-全.pdf#page=7" },
      { name: "迷宮", cat: "視覺空間", act: "107", room: "", desc: "找出迷宮的正確通路，沿途或終點取得對應線索。", answer: "", link: "./pdf/106_謎題-全.pdf#page=3" },
      { name: "神秘的圖騰", cat: "視覺空間", act: "107", room: "", desc: "觀察圖騰圖形中的隱藏規律，推算出密碼。", answer: "", link: "./pdf/106_謎題-全.pdf#page=2" },
      { name: "奇怪的馬路", cat: "視覺空間", act: "107", room: "", desc: "觀察不尋常的街道圖，從中找出隱藏的線索。", answer: "", link: "./pdf/106_謎題-全.pdf#page=5" },
      { name: "鞋底暗號", cat: "密碼解碼", act: "107", room: "", desc: "鞋底花紋圖案中隱藏暗號，需轉換角度觀察。", answer: "", link: "./pdf/106_謎題-全.pdf#page=4" },
      { name: "完美恆等式", cat: "數學計算", act: "107", room: "", desc: "觀察詞彙與次方組合的隱藏關係（如：數學、自然），推算出未知的數組代碼。", answer: "", link: "./pdf/107_謎題-全.pdf#page=6" },
      { name: "謎題-全（數字矩陣）", cat: "密碼解碼", act: "106", room: "", desc: "大量數字構成的矩陣，找出排列規律以解碼。", answer: "", link: "./pdf/106_謎題-全.pdf#page=1" },
      { name: "AD轉角（坐標代碼）", cat: "密碼解碼", act: "106", room: "", desc: "依照坐標（英文字母＋數字）轉換，對應密碼表取得密碼。", answer: "GC", link: "./pdf/106_AD轉角.pdf" },
      { name: "Pic Logic（圖畫謎）", cat: "邏輯推理", act: "106", room: "", desc: "Nonogram 邏輯謎，依格數提示填色還原圖案。", answer: "", link: "./106 密室逃脫/密室逃脫/puzzle/Pic Logic.xlsx", playLink: "validators/nonogram-validator.html" },
      { name: "藏書密碼", cat: "文字語文", act: "108", room: "", desc: "利用書中文字或成語推算密碼，兩句成語隱含線索。", answer: "", link: "./pdf/108_謎題.pdf#page=1" },
      { name: "成語密碼", cat: "文字語文", act: "108", room: "", desc: "以成語詩句對應數字編碼（47, 747, 563, 495），從詩義中解讀密碼。", answer: "", link: "./pdf/108_謎題.pdf#page=4" },
      { name: "爺爺的計算機", cat: "密碼解碼", act: "108", room: "", desc: "計算機螢幕上的數字，倒置後對應英文字母取得四位字母密碼。", answer: "", link: "./pdf/108_謎題.pdf#page=1" },
      { name: "奇妙的數學式", cat: "數學計算", act: "108", room: "", desc: "英文單字當數字（FORTY + TEN + TEN = SIXTY），推算 FIFTY = ?????。", answer: "", link: "./pdf/108_謎題.pdf#page=2" },
      { name: "○的秘密", cat: "數學計算", act: "108", room: "", desc: "以○圖形隱藏數字或規律，需觀察圖形與數字的對應關係。", answer: "", link: "./pdf/108_謎題.pdf#page=2" },
      { name: "誰是說謊者？", cat: "邏輯推理", act: "108", room: "", desc: "5位嫌疑人各自陳述，已知一人是小偷且一人說謊，推理找出說謊者。", answer: "", link: "./pdf/108_謎題.pdf#page=3" },

      { name: "界織（第10關）", cat: "實體機關", act: "煉金城市", room: "", desc: "結界陣列圖：對照海報圖案，按下圓心按鈕使節點順時針旋轉，直到所有指定節點全部變為綠色。", answer: "", link: "./pdf/煉金城市_10-界織-說明.pdf" },
      { name: "520之謎", cat: "密碼解碼", act: "109", room: "", desc: "移動四根火柴棒排出數字 520，解開巧克力盒後的甜蜜暗號。", answer: "Love You", playLink: "validators/520-mystery.html" },
      { name: "壞掉的計算機", cat: "邏輯推理", act: "109", room: "", desc: "Google 表單互動謎題：面對顯示異常的計算機，如何解開背後的規律？", answer: "", playLink: "https://docs.google.com/forms/d/1Pb3e3Iot_JEyF6YXej52Ea9jgNeuqmBdrbwp4u8zCo8/viewform" },
      { name: "似乎是我的手機", cat: "密碼解碼", act: "109", room: "", desc: "Google 表單互動謎題：在散落的手機訊息中尋找線索。", answer: "", playLink: "https://docs.google.com/forms/d/1eut9txohn4l1NfXWQSANXhtSuoeF61ne_Ms-6cuqIW4/viewform" },
      { name: "老舊的十字架", cat: "文字語文", act: "109", room: "", desc: "Google 表單互動謎題：古老十字架上刻著神祕的文字...", answer: "", playLink: "https://docs.google.com/forms/d/1I2ahpa6_gFVI-EQeljcw5tW5HCctt2pCPVwDE4efhhg/viewform" },
      { name: "奇怪的箭頭", cat: "視覺空間", act: "109", room: "", desc: "Google 表單互動謎題：牆上不合常理的箭頭指示，隱藏著通往出口的密碼。", answer: "", playLink: "https://docs.google.com/forms/d/1ZXgjMlEa1qai-Cw20HR9X5R413LS4fGK9QnhuoLHFn0/viewform" },
      { name: "數學家的肖像-room2", cat: "邏輯推理", act: "109", room: "", desc: "Google 表單互動謎題：探索數學家肖像背後的第二間密室。", answer: "", playLink: "https://docs.google.com/forms/d/12shqVZmyUdihGWh6C-WTgKeU-1fVj3V3S-MPEGqSrZc/viewform" },
      { name: "月曆紙後的字", cat: "文字語文", act: "109", room: "", desc: "Google 表單互動謎題：翻開看似平凡的月曆，背面竟藏有手寫的密碼線索。", answer: "", playLink: "https://forms.gle/dgeFuwgPDAnKwDDR8" },
      { name: "門上的海報", cat: "視覺空間", act: "109", room: "", desc: "Google 表單互動謎題：仔細觀察門上貼著的海報，某些細節顯露了答案。", answer: "", playLink: "https://forms.gle/KarQMCVMDnDApkLD8" },
      { name: "尤拉的肖像", cat: "視覺空間", act: "109", room: "", desc: "數學大師尤拉的肖像中，藏有幾何規律與密碼連動。", answer: "", link: "./pdf/尤拉的肖像.pdf" },
    ];

    // ── Meta ──
    const catMeta = {
      "文字語文": { icon: "🔤", css: "background:var(--green-bg);color:var(--green)" },
      "密碼解碼": { icon: "🔢", css: "background:var(--amber-bg);color:var(--amber)" },
      "邏輯推理": { icon: "🧩", css: "background:var(--cyan-bg);color:var(--cyan)" },
      "數學計算": { icon: "➕", css: "background:var(--blue-bg);color:var(--blue)" },
      "視覺空間": { icon: "👁️", css: "background:var(--purple-bg);color:var(--purple)" },
      "聽覺感知": { icon: "🎧", css: "background:var(--rose-bg);color:var(--rose)" },
      "實體機關": { icon: "⚙️", css: "background:var(--orange-bg);color:var(--orange)" },
    };
    const actMeta = {
      "106": { label: "106年" },
      "107": { label: "107年" },
      "108": { label: "108年" },
      "109": { label: "109年" },
      "112": { label: "112年" },
      "113": { label: "113年" },
      "嘉年華": { label: "嘉年華" },
      "煉金城市": { label: "煉金城市" },
    };

    // ── State ──
    let puzzles = JSON.parse(localStorage.getItem("editorPuzzles") || "null") || [...defaultPuzzles];
    let showAnswers = false;
    let editingIndex = -1;
    let searchTerm = "";
    let filterCat = "all";
    let filterAct = "all";
    let sortField = "";
    let sortAsc = true;

    // ── Init activity filter options ──
    function initActFilter() {
      const sel = document.getElementById("filterAct");
      const acts = [...new Set(puzzles.map(p => p.act))];
      acts.forEach(a => {
        const opt = document.createElement("option");
        opt.value = a;
        opt.textContent = (actMeta[a]?.label || a);
        sel.appendChild(opt);
      });
    }
    initActFilter();

    // ── Save to localStorage ──
    function save() {
      localStorage.setItem("editorPuzzles", JSON.stringify(puzzles));
    }

    // ── Render ──
    function render() {
      const tbody = document.getElementById("tableBody");
      let filtered = puzzles.map((p, i) => ({ ...p, _idx: i }));

      if (filterCat !== "all") filtered = filtered.filter(p => p.cat === filterCat);
      if (filterAct !== "all") filtered = filtered.filter(p => p.act === filterAct);
      if (searchTerm) {
        const s = searchTerm.toLowerCase();
        filtered = filtered.filter(p =>
          (p.name + p.desc + p.answer + p.cat + p.room + p.act).toLowerCase().includes(s)
        );
      }

      if (sortField) {
        filtered.sort((a, b) => {
          const va = (a[sortField] || "").toLowerCase();
          const vb = (b[sortField] || "").toLowerCase();
          return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        });
      }

      document.getElementById("totalCount").textContent = puzzles.length;
      document.getElementById("visibleCount").textContent = filtered.length;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:3rem;color:var(--text-dim);">找不到符合條件的謎題</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map((p, vi) => {
        const cm = catMeta[p.cat] || { icon: "?", css: "" };
        const am = actMeta[p.act] || { label: p.act };
        const idx = p._idx;

        // answer cell
        let answerHtml;
        if (!p.answer) {
          answerHtml = `<span class="answer-empty">—</span>`;
        } else if (showAnswers) {
          answerHtml = `<span class="answer-text">${escHtml(p.answer)}</span>`;
        } else {
          answerHtml = `<span class="answer-hidden" onclick="revealAnswer(this, '${escAttr(p.answer)}')">🔒 點擊顯示</span>`;
        }

        // link cell
        let linkHtml = "";
        if (p.link) {
          linkHtml += `<a class="link-icon" href="${escAttr(p.link)}" target="_blank" title="檔案連結">📄</a> `;
        }
        if (p.playLink) {
          linkHtml += `<a class="link-icon" href="${escAttr(p.playLink)}" target="_blank" title="互動驗證" style="background:var(--teal-bg);color:var(--teal);">🕹️</a>`;
        }
        if (!p.link && !p.playLink) linkHtml = `<span class="no-link">—</span>`;

        return `<tr>
          <td class="cell-name">${vi + 1}. ${escHtml(p.name)}</td>
          <td class="cell-cat"><span class="tag-mini" style="${cm.css}">${cm.icon} ${p.cat}</span></td>
          <td class="cell-act">${am.label}</td>
          <td class="cell-room">${escHtml(p.room) || '<span class="answer-empty">—</span>'}</td>
          <td class="cell-desc">${escHtml(p.desc)}</td>
          <td class="cell-answer">${answerHtml}</td>
          <td class="cell-link">${linkHtml}</td>
          <td class="cell-actions">
            <button class="btn btn-sm" onclick="openModal(${idx})">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deletePuzzle(${idx})">🗑️</button>
          </td>
        </tr>`;
      }).join("");
    }

    // ── Helpers ──
    function escHtml(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
    function escAttr(s) { return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

    function revealAnswer(el, answer) {
      el.outerHTML = `<span class="answer-text">${escHtml(answer)}</span>`;
    }

    function toggleGlobalAnswer() {
      showAnswers = !showAnswers;
      const btn = document.getElementById("toggleAnswerBtn");
      btn.textContent = showAnswers ? "🙈 隱藏答案" : "👁️ 顯示答案";
      render();
    }

    function sortBy(field) {
      if (sortField === field) {
        sortAsc = !sortAsc;
      } else {
        sortField = field;
        sortAsc = true;
      }
      render();
    }

    // ── Modal ──
    function openModal(idx) {
      editingIndex = idx !== undefined ? idx : -1;
      const modal = document.getElementById("modalOverlay");
      const title = document.getElementById("modalTitle");

      if (editingIndex >= 0) {
        title.textContent = "編輯謎題";
        const p = puzzles[editingIndex];
        document.getElementById("f_name").value = p.name;
        document.getElementById("f_cat").value = p.cat;
        document.getElementById("f_act").value = p.act;
        document.getElementById("f_room").value = p.room || "";
        document.getElementById("f_desc").value = p.desc || "";
        document.getElementById("f_answer").value = p.answer || "";
        document.getElementById("f_link").value = p.link || "";
        document.getElementById("f_playLink").value = p.playLink || "";
      } else {
        title.textContent = "新增謎題";
        document.getElementById("f_name").value = "";
        document.getElementById("f_cat").value = "文字語文";
        document.getElementById("f_act").value = "112";
        document.getElementById("f_room").value = "";
        document.getElementById("f_desc").value = "";
        document.getElementById("f_answer").value = "";
        document.getElementById("f_link").value = "";
        document.getElementById("f_playLink").value = "";
      }

      modal.classList.add("active");
      document.getElementById("f_name").focus();
    }

    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("active");
      editingIndex = -1;
    }

    function savePuzzle() {
      const name = document.getElementById("f_name").value.trim();
      if (!name) { toast("請輸入謎題名稱"); return; }

      const data = {
        name,
        cat: document.getElementById("f_cat").value,
        act: document.getElementById("f_act").value,
        room: document.getElementById("f_room").value.trim(),
        desc: document.getElementById("f_desc").value.trim(),
        answer: document.getElementById("f_answer").value.trim(),
        link: document.getElementById("f_link").value.trim(),
      };
      const playLink = document.getElementById("f_playLink").value.trim();
      if (playLink) data.playLink = playLink;

      if (editingIndex >= 0) {
        puzzles[editingIndex] = { ...puzzles[editingIndex], ...data };
        toast("已更新「" + name + "」");
      } else {
        puzzles.push(data);
        toast("已新增「" + name + "」");
      }

      save();
      render();
      closeModal();
    }

    function deletePuzzle(idx) {
      const name = puzzles[idx].name;
      if (!confirm(`確定要刪除「${name}」嗎？`)) return;
      puzzles.splice(idx, 1);
      save();
      render();
      toast("已刪除「" + name + "」");
    }

    // ── Import / Export ──
    function exportJSON() {
      const json = JSON.stringify(puzzles, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "puzzles.json";
      a.click();
      URL.revokeObjectURL(url);
      toast("已匯出 JSON 檔案");
    }

    function importJSON() {
      document.getElementById("fileInput").click();
    }

    function handleImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error("格式錯誤");
          puzzles = data;
          save();
          render();
          toast("已匯入 " + data.length + " 筆謎題");
        } catch (err) {
          toast("匯入失敗：" + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    // ── Toast ──
    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2500);
    }

    // ── Filter events ──
    let debounce;
    document.getElementById("editorSearch").addEventListener("input", e => {
      clearTimeout(debounce);
      debounce = setTimeout(() => { searchTerm = e.target.value.trim(); render(); }, 180);
    });
    document.getElementById("filterCat").addEventListener("change", e => { filterCat = e.target.value; render(); });
    document.getElementById("filterAct").addEventListener("change", e => { filterAct = e.target.value; render(); });

    // ── Keyboard shortcut ──
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeModal();
    });

    // ── Init ──
    render();
  </script>
</body>

</html>
